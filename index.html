<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Expense Tracker</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #152e5c, #446eb9);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  width: 380px;
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h2 {
  text-align: center;
  margin-bottom: 10px;
}

.balance {
  text-align: center;
  margin: 15px 0;
}

.balance h3 {
  margin: 5px 0;
}

.inc-exp {
  display: flex;
  justify-content: space-between;
  background: #f4f4f4;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 15px;
}

.inc-exp div {
  text-align: center;
}

.inc {
  color: green;
}

.exp {
  color: red;
}

.form input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  background: #2a5298;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #1e3c72;
}

.list {
  margin-top: 15px;
  max-height: 200px;
  overflow-y: auto;
}

.item {
  display: flex;
  justify-content: space-between;
  background: #f4f4f4;
  padding: 8px;
  margin-top: 8px;
  border-radius: 6px;
}

.item.inc {
  border-right: 5px solid green;
}

.item.exp {
  border-right: 5px solid red;
}

.delete {
  cursor: pointer;
  color: red;
}
</style>
</head>

<body>

<div class="container">
  <h2> Expense Tracker</h2>

  <div class="balance">
    <h3>Balance</h3>
    <h2 id="balance">₹0</h2>
  </div>

  <div class="inc-exp">
    <div>
      <h4>Income</h4>
      <p class="inc" id="income">₹0</p>
    </div>
    <div>
      <h4>Expense</h4>
      <p class="exp" id="expense">₹0</p>
    </div>
  </div>

  <div class="form">
    <input type="text" id="text" placeholder="Enter description">
    <input type="number" id="amount" placeholder="Enter amount (+ income, - expense)">
    <button onclick="addTransaction()">Add Transaction</button>
  </div>

  <div class="list" id="list"></div>
</div>

<script>
let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

function addTransaction() {
  const text = document.getElementById("text").value;
  const amount = document.getElementById("amount").value;

  if (text === "" || amount === "") return;

  const transaction = {
    id: Date.now(),
    text,
    amount: +amount
  };

  transactions.push(transaction);
  saveData();
  updateUI();

  document.getElementById("text").value = "";
  document.getElementById("amount").value = "";
}

function deleteTransaction(id) {
  transactions = transactions.filter(t => t.id !== id);
  saveData();
  updateUI();
}

function updateUI() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  let income = 0;
  let expense = 0;

  transactions.forEach(t => {
    const sign = t.amount > 0 ? "inc" : "exp";

    if (t.amount > 0) income += t.amount;
    else expense += Math.abs(t.amount);

    const div = document.createElement("div");
    div.classList.add("item", sign);

    div.innerHTML = `
      ${t.text} <span>₹${t.amount}</span>
      <span class="delete" onclick="deleteTransaction(${t.id})">❌</span>
    `;

    list.appendChild(div);
  });

  document.getElementById("income").innerText = "₹" + income;
  document.getElementById("expense").innerText = "₹" + expense;
  document.getElementById("balance").innerText = "₹" + (income - expense);
}

function saveData() {
  localStorage.setItem("transactions", JSON.stringify(transactions));
}

updateUI();
</script>

</body>
</html>
